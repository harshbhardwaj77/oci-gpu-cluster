# ─────────────────────────────────────────────────────────────
# GPU-aware Horizontal Pod Autoscaler (OPTIONAL)
# Scales vLLM replicas based on GPU utilization metrics
# ─────────────────────────────────────────────────────────────
#
# PREREQUISITES:
#   1. kube-prometheus-stack installed (provides Prometheus)
#   2. prometheus-adapter installed (exposes custom metrics to K8s)
#   3. DCGM exporter running (installed by GPU Operator)
#
# Prometheus Adapter config must map DCGM_FI_DEV_GPU_UTIL
# to the custom metrics API. See install.sh for helm commands.
#
# ─────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-llama-hpa
  namespace: llm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-llama

  minReplicas: 1        # Keep at least 1 for low-latency (set to 0 with KEDA for full scale-to-zero)
  maxReplicas: 3

  metrics:
    # Scale based on GPU utilization (from DCGM exporter via Prometheus)
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "70"       # Scale up when avg GPU util > 70%

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # Wait 5 min of low usage before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60     # Scale up faster
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
