# ─────────────────────────────────────────────────────────────
# Cluster Autoscaler for OKE
# Scales GPU node pool from 0 → N based on pending pod demand
# ─────────────────────────────────────────────────────────────
#
# BEFORE APPLYING: Replace the following placeholders:
#   <GPU_NODE_POOL_OCID>  → terraform output gpu_node_pool_id
#   <CPU_NODE_POOL_OCID>  → terraform output cpu_node_pool_id
#
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "list", "get", "update"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "replicationcontrollers", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["extensions"]
    resources: ["replicasets", "daemonsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["watch", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "replicasets", "daemonsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["batch", "extensions"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cluster-autoscaler
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
    spec:
      serviceAccountName: cluster-autoscaler
      nodeSelector:
        workload-type: system        # Run on CPU nodes, not GPU nodes
      containers:
        - name: cluster-autoscaler
          image: iad.ocir.io/oracle/oci-cluster-autoscaler:1.28.0-10
          command:
            - ./cluster-autoscaler
            - --v=4
            - --cloud-provider=oci
            - --namespace=kube-system
            - --max-node-provision-time=25m       # GPU nodes take ~5-8 min
            - --scale-down-delay-after-add=10m    # Wait 10 min after adding before considering removal
            - --scale-down-unneeded-time=10m      # Node must be idle 10 min before removal
            - --scale-down-utilization-threshold=0.5
            - --skip-nodes-with-local-storage=false
            - --balance-similar-node-groups=true
            # ── Node pools: min:max:ocid ──
            - "--nodes=0:3:<GPU_NODE_POOL_OCID>"
            - "--nodes=1:3:<CPU_NODE_POOL_OCID>"
          env:
            - name: OKE_USE_INSTANCE_PRINCIPAL
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 500Mi
